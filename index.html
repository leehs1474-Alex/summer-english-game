<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Summer Island Rescue</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,"Noto Sans KR",sans-serif;background:linear-gradient(#58c7ff 0%,#b9f2ff 45%,#ffe891 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;color:#17324d}
.game{width:min(94vw,760px);background:rgba(255,255,255,.96);border-radius:28px;padding:22px;box-shadow:0 12px 30px rgba(0,0,0,.22);text-align:center}
h1{margin:8px 0;font-size:32px}h2{margin:8px 0 16px;font-size:24px}
.emoji{font-size:72px;margin:10px 0}.story{font-size:18px;line-height:1.55;margin:14px 0 18px}
input{font-size:18px;padding:13px;width:86%;margin:7px 0;border:2px solid #b8d8ee;border-radius:12px}
button{font-size:18px;font-weight:bold;padding:13px 18px;margin:8px;border:none;border-radius:16px;background:#1d9a6c;color:white;cursor:pointer;box-shadow:0 5px 0 #12714e}
button:active{transform:translateY(2px);box-shadow:0 3px 0 #12714e}button:disabled{background:#99aaa2;box-shadow:0 5px 0 #707870;cursor:not-allowed}
.choice{display:block;width:90%;margin:11px auto;background:#fff;color:#17324d;border:3px solid #8fd4ff;box-shadow:none;font-size:21px}
.dayBtn,.levelBtn{display:block;width:90%;margin:12px auto;background:#fff;color:#17324d;border:3px solid #ffd35c;box-shadow:none;text-align:left}
.dayBtn.selected,.levelBtn.selected{background:#fff1aa;border-color:#ff9f1c}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:8px;font-weight:bold;margin-bottom:12px;font-size:15px}
.progress{letter-spacing:2px;font-size:18px;background:#eefbff;border-radius:14px;padding:9px;margin:8px auto 13px}
.tag{display:inline-block;background:#e8f7ff;border:2px solid #9fd8ff;border-radius:12px;padding:6px 10px;font-weight:bold;margin:4px}
.teacher{background:#fff7d6;border:3px dashed #ffbf3f;border-radius:20px;padding:14px;margin:12px 0;font-size:18px}
.feedback{min-height:38px;font-size:20px;line-height:1.45;font-weight:bold;margin-top:12px}.correct{color:#148f5d}.wrong{color:#d13b3b}
.small{font-size:14px;color:#607080;margin-top:14px}.badge{font-size:27px;background:#fff1a8;display:inline-block;padding:14px 20px;border-radius:18px;margin:14px 0;border:3px solid #ffd95a}
.listenBtn{background:#3366cc;box-shadow:0 5px 0 #20438c;font-size:22px}.helper{background:#fff2fb;border:3px solid #ff9ee8;border-radius:18px;padding:12px;margin:10px 0}
.status{font-size:17px;margin-top:12px;color:#334;min-height:28px}
.grid{display:grid;grid-template-columns:1fr;gap:4px}
</style>
</head>
<body>
<div class="game" id="app"></div>
<script>

const GAME_DATA = {"DAY1": {"teacher": "Rachel", "place": "해변", "introEmoji": "🌊⛈️🏝️", "intro": "폭풍 때문에 배가 난파되었어요. Rachel 선생님이 해변에 혼자 남아 있어요!", "mid1": "Rachel 선생님을 발견했어요! 조금만 더 도와주세요.", "mid2": "구조 보트를 찾았어요! 마지막 미션까지 힘내요.", "next": "다음 미션: Alex 선생님을 구하러 가세요!", "questions": [{"type": "picture", "emoji": "🐱", "sound": "short a", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["cat", "cap", "cup"], "answer": "cat"}, {"type": "listen", "word": "bed", "sound": "short e", "prompt": "발음을 듣고 맞는 단어를 골라보세요.", "choices": ["bad", "bed", "bid"], "answer": "bed"}, {"type": "picture", "emoji": "🐷", "sound": "short i", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["big", "bag", "pig"], "answer": "pig"}, {"type": "listen", "word": "dog", "sound": "short o", "prompt": "발음을 듣고 맞는 단어를 골라보세요.", "choices": ["dog", "dig", "duck"], "answer": "dog"}, {"type": "picture", "emoji": "☀️", "sound": "short u", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["son", "sun", "sin"], "answer": "sun"}, {"type": "listen", "word": "shop", "sound": "sh", "prompt": "발음을 듣고 맞는 단어를 골라보세요.", "choices": ["chop", "ship", "shop"], "answer": "shop"}, {"type": "sound", "word": "chair", "sound": "ch", "prompt": "chair와 같은 시작 소리가 나는 단어를 골라보세요.", "choices": ["chick", "shell", "fish"], "answer": "chick"}, {"type": "picture", "emoji": "🐟", "sound": "short i", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["dish", "fish", "ship"], "answer": "fish"}, {"type": "helper", "word": "have", "sound": "Helper Word", "prompt": "⭐ 특별 미션! 발음을 듣고 Helper Word를 골라보세요.", "choices": ["gave", "hive", "have"], "answer": "have"}, {"type": "listen", "word": "hat", "sound": "short a", "prompt": "발음을 듣고 맞는 단어를 골라보세요.", "choices": ["hat", "hot", "hit"], "answer": "hat"}, {"type": "picture", "emoji": "🚌", "sound": "short u", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["bug", "bus", "boss"], "answer": "bus"}, {"type": "final", "word": "chicken", "sound": "Final Mission", "prompt": "👑 마지막 구조 미션! 발음을 듣고 맞는 단어를 골라보세요.", "choices": ["kitchen", "children", "chicken"] 3": {"teacher": "Sunny", "place": "동굴", "introEmoji": "⛰️🕯️🦇", "intro": "Rachel, Alex 선생님을 구했어요! 이제 Sunny 선생님이 동굴에서 길을 잃었어요.", "mid1": "동굴 안에서 반짝이는 길을 찾았어요!", "mid2": "Sunny 선생님이 가까이에 있어요. 장모음 소리를 잘 들어보세요.", "next": "다음 미션: Daniel 선생님을 구하러 가세요!", "questions": [{"type": "picture", "emoji": "🌧️", "sound": "ai", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["rain", "run", "ran"], "answer": "rain"}, {"type": "listen", "word": "train", "sound": "ai", "prompt": "발음을 듣고 맞는 단어를 골라보세요.", "choices": ["tree", "train", "rain"], "answer": "train"}, {"type": "picture", "emoji": "🌳", "sound": "ee", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["three", "free", "tree"], "answer": "tree"}, {"type": "listen", "word": "beach", "sound": "ea", "prompt": "발음을 듣고 맞는 단어를 골라보세요.", "choices": ["beach", "bench", "peach"], "answer": "beach"}, {"type": "picture", "emoji": "✉️", "sound": "ai", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["male", "mail", "meal"], "answer": "mail"}, {"type": "listen", "word": "play", "sound": "ay", "prompt": "발음을 듣고 맞는 단어를 골라보세요.", "choices": ["pray", "plan", "play"], "answer": "play"}, {"type": "sound", "word": "seed", "sound": "ee", "prompt": "seed와 같은 모음 소리가 나는 단어를 골라보세요.", "choices": ["see", "sit", "sad"], "answer": "see"}, {"type": "picture", "emoji": "🛣️", "sound": "oa", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["rode", "road", "red"], "answer": "road"}, {"type": "helper", "word": "come", "sound": "Helper Word", "prompt": "⭐ 특별 미션! 발음을 듣고 Helper Word를 골라보세요.", "choices": ["came", "comb", "come"], "answer": "come"}, {"type": "listen", "word": "snow", "sound": "ow", "prompt": "발음을 듣고 맞는 단어를 골라보세요.", "choices": ["snow", "snail", "slow"], "answer": "snow"}, {"type": "picture", "emoji": "🚤", "sound": "oa", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["boot", "boat", "bat"], "answer": "boat"}, {"type": "final", "word": "rainbow", "sound": "Final Mission", "prompt": "👑 마지막 구조 미션! 발음을 듣고 맞는 단어를 골라보세요.", "choices": ["rainbow", "window", "yellow"], "answer": "rainbow"}]}, "DAY4": {"teacher": "Daniel", "place": "화산", "introEmoji": "🌋🔥🏝️", "intro": "마지막 미션입니다! Daniel 선생님이 화산 근처에 있어요.", "mid1": "뜨거운 길을 지나 Daniel 선생님을 찾고 있어요!", "mid2": "마지막 구조 지점에 도착했어요. 끝까지 집중하세요.", "next": "모든 선생님 구조 완료!", "questions": [{"type": "picture", "emoji": "🪙", "sound": "oi", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["coin", "corn", "cone"], "answer": "coin"}, {"type": "listen", "word": "boy", "sound": "oy", "prompt": "발음을 듣고 맞는 단어를 골라보세요.", "choices": ["buy", "boy", "bay"], "answer": "boy"}, {"type": "picture", "emoji": "☁️", "sound": "ou", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["cold", "climb", "cloud"], "answer": "cloud"}, {"type": "listen", "word": "cow", "sound": "ow", "prompt": "발음을 듣고 맞는 단어를 골라보세요.", "choices": ["cow", "coin", "coat"], "answer": "cow"}, {"type": "picture", "emoji": "🐦", "sound": "ir", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["bed", "bird", "bread"], "answer": "bird"}, {"type": "listen", "word": "nurse", "sound": "ur", "prompt": "발음을 듣고 맞는 단어를 골라보세요.", "choices": ["nose", "nine", "nurse"], "answer": "nurse"}, {"type": "sound", "word": "star", "sound": "ar", "prompt": "star와 같은 모음 소리가 나는 단어를 골라보세요.", "choices": ["car", "cat", "cut"], "answer": "car"}, {"type": "picture", "emoji": "🌸", "sound": "ow/er", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["floor", "flower", "flour"], "answer": "flower"}, {"type": "helper", "word": "one", "sound": "Helper Word", "prompt": "⭐ 특별 미션! 발음을 듣고 Helper Word를 골라보세요.", "choices": ["own", "won", "one"], "answer": "one"}, {"type": "listen", "word": "toy", "sound": "oy", "prompt": "발음을 듣고 맞는 단어를 골라보세요.", "choices": ["toy", "tie", "toe"], "answer": "toy"}, {"type": "picture", "emoji": "🛢️", "sound": "oi", "prompt": "알맞은 영어 단어를 골라보세요.", "choices": ["owl", "oil", "old"], "answer": "oil"}, {"type": "final", "word": "storm", "sound": "Final Mission", "prompt": "👑 마지막 구조 미션! 발음을 듣고 맞는 단어를 골라보세요.", "choices": ["stone", "storm", "steam"], "answer": "storm"}]}};

let playerName="", playerClass="", selectedLevel="", selectedDay="";
let currentDayData=null, questions=[];
let idx=0, score=0, stars=0, startTime=null, saved=false;
const app=document.getElementById("app");

function startScreen(){
  saved=false; selectedLevel=""; selectedDay="";
  app.innerHTML=`
    <div class="emoji">🏝️🚤🌊</div>
    <h1>Summer Island Rescue</h1>
    <h2>Save Your Teachers!</h2>
    <div class="story">폭풍 때문에 선생님들이 섬에 흩어졌어요.<br>영어 미션을 풀고 선생님들을 구해주세요!</div>
    <input id="name" placeholder="이름 입력 예: 김민준" autocomplete="off"/>
    <input id="className" placeholder="반 입력 예: SC1 / SE2 / ST3" autocomplete="off"/>
    <div class="story" style="margin-bottom:6px;">난이도를 선택하세요.</div>
    <button class="levelBtn" id="lv1" onclick="selectLevel('LEVEL1')">🟢 LEVEL 1 - 파닉스 / 초1~2</button>
    <button class="levelBtn" id="lv2" onclick="selectLevel('LEVEL2')">🟡 LEVEL 2 - 단어·문장 / 준비 중</button>
    <button class="levelBtn" id="lv3" onclick="selectLevel('LEVEL3')">🔴 LEVEL 3 - 독해·문법 / 준비 중</button>
    <button onclick="goDaySelect()">다음</button>
    <div class="small">현재 버전: LEVEL 1 DAY1~DAY4 48문제 완성</div>`;
}

function selectLevel(level){
  selectedLevel=level;
  ["lv1","lv2","lv3"].forEach(id=>document.getElementById(id).classList.remove("selected"));
  if(level==="LEVEL1") document.getElementById("lv1").classList.add("selected");
  if(level==="LEVEL2") document.getElementById("lv2").classList.add("selected");
  if(level==="LEVEL3") document.getElementById("lv3").classList.add("selected");
}

function goDaySelect(){
  playerName=document.getElementById("name").value.trim();
  playerClass=document.getElementById("className").value.trim();
  if(!playerName||!playerClass){alert("이름과 반을 정확히 입력하세요.");return;}
  if(!selectedLevel){alert("난이도를 선택하세요.");return;}
  if(selectedLevel!=="LEVEL1"){alert("현재는 LEVEL 1만 플레이 가능합니다.");return;}
  daySelectScreen();
}

function daySelectScreen(){
  app.innerHTML=`
    <div class="emoji">🗺️</div>
    <h1>오늘의 미션 선택</h1>
    <div class="story">선생님 한 명씩 구조하세요.</div>
    <button class="dayBtn" id="d1" onclick="selectDay('DAY1')">🌊 DAY 1 - Rachel Rescue / 해변</button>
    <button class="dayBtn" id="d2" onclick="selectDay('DAY2')">🌴 DAY 2 - Alex Rescue / 정글</button>
    <button class="dayBtn" id="d3" onclick="selectDay('DAY3')">⛰️ DAY 3 - Sunny Rescue / 동굴</button>
    <button class="dayBtn" id="d4" onclick="selectDay('DAY4')">🌋 DAY 4 - Daniel Rescue / 화산</button>
    <button onclick="beginGame()">게임 시작</button>
    <button onclick="startScreen()">처음으로</button>`;
}

function selectDay(day){
  selectedDay=day;
  ["d1","d2","d3","d4"].forEach(id=>document.getElementById(id).classList.remove("selected"));
  document.getElementById("d"+day.replace("DAY","")).classList.add("selected");
}

function beginGame(){
  if(!selectedDay){alert("DAY를 선택하세요.");return;}
  currentDayData=GAME_DATA[selectedDay];
  questions=currentDayData.questions;
  idx=0; score=0; stars=0; saved=false; startTime=new Date();
  storyIntro();
}

function storyIntro(){
  app.innerHTML=`
    <div class="emoji">${currentDayData.introEmoji}</div>
    <h1>${currentDayData.teacher} Rescue</h1>
    <div class="teacher">😭 <b>${currentDayData.teacher} 선생님</b><br>"도와줘! ${currentDayData.place}에 있어!"<br>"영어 미션을 풀어서 나를 구해줘!"</div>
    <div class="story">${currentDayData.intro}</div>
    <div class="story">총 <b>12개 미션</b>을 완료하면 구조할 수 있어요.</div>
    <button onclick="showQuestion()">미션 시작</button>`;
}

function progressBar(){
  return "⭐".repeat(stars) + "☆".repeat(questions.length-stars);
}

function showQuestion(){
  const item=questions[idx];
  let special="";
  if(item.type==="helper") special=`<div class="helper">⭐ Helper Word는 파닉스 규칙만으로 읽기 어려운 특별한 단어예요!</div>`;
  if(item.type==="final") special=`<div class="helper">👑 FINAL RESCUE MISSION<br>이 문제를 풀면 선생님을 구할 수 있어요!</div>`;
  const listenPart=(item.type==="listen"||item.type==="helper"||item.type==="final")
    ? `<button class="listenBtn" onclick="speak('${escapeQuote(item.word)}')">🔊 발음 듣기</button>` : "";
  app.innerHTML=`
    <div class="topbar"><div>${selectedDay}</div><div>${selectedLevel}</div><div>문제 ${idx+1}/${questions.length}</div></div>
    <div class="progress">${progressBar()}</div>
    <div><span class="tag">오늘의 소리: ${item.sound}</span></div>
    ${special}
    <div class="emoji">${item.emoji ? item.emoji : "🎧"}</div>
    <h2>${item.prompt}</h2>
    ${listenPart}
    ${item.type==="sound" ? `<div class="story"><b>${item.word}</b></div>` : ""}
    ${item.choices.map(c=>`<button class="choice" onclick="checkAnswer('${escapeQuote(c)}')">${c}</button>`).join("")}
    <div class="feedback" id="feedback"></div>`;
}

function checkAnswer(choice){
  const item=questions[idx];
  const fb=document.getElementById("feedback");
  document.querySelectorAll("button").forEach(b=>b.disabled=true);
  if(choice===item.answer){
    score+=10; stars++;
    fb.innerHTML="🎉 정답입니다! +1 ⭐";
    fb.className="feedback correct";
  }else{
    fb.innerHTML=`😥 아쉬워요!<br>정답은 <b>${item.answer}</b> 입니다.`;
    fb.className="feedback wrong";
  }
  setTimeout(()=>{
    idx++;
    if(idx===4) storyMiddle1();
    else if(idx===8) storyMiddle2();
    else if(idx<questions.length) showQuestion();
    else endScreen();
  },1300);
}

function storyMiddle1(){
  app.innerHTML=`
    <div class="emoji">👀✨</div>
    <h1>선생님 발견!</h1>
    <div class="teacher">😭 "${currentDayData.mid1}"</div>
    <div class="progress">${progressBar()}</div>
    <button onclick="showQuestion()">계속하기</button>`;
}

function storyMiddle2(){
  app.innerHTML=`
    <div class="emoji">🚤✨</div>
    <h1>거의 다 왔어요!</h1>
    <div class="teacher">😊 "${currentDayData.mid2}"</div>
    <div class="progress">${progressBar()}</div>
    <button onclick="showQuestion()">마지막 미션으로</button>`;
}

function endScreen(){
  let badge="Bronze Rescuer";
  if(score>=100) badge="Gold Rescuer";
  else if(score>=80) badge="Silver Rescuer";
  app.innerHTML=`
    <div class="emoji">🚤🏆🌊</div>
    <h1>${currentDayData.teacher} 구조 성공!</h1>
    <div class="teacher">🥹 <b>${currentDayData.teacher} 선생님</b><br>"고마워! 덕분에 무사히 탈출했어!"</div>
    <div class="badge">${stars} / 12 ⭐<br>${score} EXP<br>${badge}</div>
    <div class="story">이름: ${playerName}<br>반: ${playerClass}<br>난이도: ${selectedLevel}<br>DAY: ${selectedDay}<br>점수: ${score}</div>
    <button id="saveBtn" onclick="saveToSheet()">선생님 기록에 저장하기</button>
    <button onclick="daySelectScreen()">다른 DAY 하기</button>
    <button onclick="startScreen()">처음으로</button>
    <div class="status" id="saveStatus">마지막으로 저장 버튼을 눌러야 기록됩니다.</div>
    <div class="small">${currentDayData.next}</div>`;
}

function speak(text){
  if(!("speechSynthesis" in window)){alert("이 기기에서는 발음 재생을 지원하지 않을 수 있습니다.");return;}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US"; u.rate=0.78; u.pitch=1;
  window.speechSynthesis.speak(u);
}

function saveToSheet(){
  if(saved){document.getElementById("saveStatus").innerText="이미 저장되었습니다.";return;}
  if(!WEB_APP_URL||WEB_APP_URL==="https://script.google.com/macros/s/AKfycbytZa1ykFlNE3a4XdJIPJyQzK7PiZlWXlbLU1k7CD23KzUGcpjMuJ6mNaJl-AjH1apl/exec"){alert("아직 Apps Script 웹 앱 URL이 들어가지 않았습니다.");return;}
  const saveBtn=document.getElementById("saveBtn");
  const status=document.getElementById("saveStatus");
  saveBtn.disabled=true; status.innerText="저장 중... 잠시만 기다리세요.";
  const playSeconds=startTime?Math.round((new Date()-startTime)/1000):"";
  fetch(WEB_APP_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({
    name:playerName,className:playerClass,level:selectedLevel,score:score,day:selectedDay,teacher:currentDayData.teacher,stars:stars,playSeconds:playSeconds
  })}).then(()=>{saved=true;status.innerText="✅ 저장 완료! 선생님 기록에 제출되었습니다.";})
  .catch(()=>{saveBtn.disabled=false;status.innerText="❌ 저장 실패. 인터넷 연결을 확인하고 다시 눌러주세요.";})
}

function escapeQuote(str){return String(str).replace(/'/g,"\\'");}
startScreen();
</script>
</body>
</html>
