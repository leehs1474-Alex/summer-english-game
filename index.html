<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Summer Island Rescue</title>
<style>
*{box-sizing:border-box}
body{
  --day-bg:linear-gradient(#58c7ff 0%,#b9f2ff 45%,#ffe891 100%);
  --day-brightness:.78;
  margin:0;
  font-family:Arial,"Noto Sans KR",sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#17324d;
  position:relative;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:-10px;
  background-image:var(--day-bg);
  background-size:cover;
  background-position:center;
  filter:blur(2px) brightness(var(--day-brightness));
  transform:scale(1.03);
  z-index:-2;
  transition:background-image .35s ease, filter .35s ease;
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(8,24,38,.18);
  z-index:-1;
  pointer-events:none;
}
.game{width:min(94vw,760px);background:rgba(255,255,255,.96);border-radius:28px;padding:22px;box-shadow:0 16px 42px rgba(0,0,0,.30);text-align:center;backdrop-filter:blur(2px)}
h1{margin:8px 0;font-size:32px}h2{margin:8px 0 16px;font-size:24px}
.emoji{font-size:72px;margin:10px 0}.story{font-size:18px;line-height:1.55;margin:14px 0 18px}
input{font-size:18px;padding:13px;width:86%;margin:7px 0;border:2px solid #b8d8ee;border-radius:12px}
button{font-size:18px;font-weight:bold;padding:13px 18px;margin:8px;border:none;border-radius:16px;background:#1d9a6c;color:white;cursor:pointer;box-shadow:0 5px 0 #12714e}
button:hover{transform:translateY(-2px) scale(1.02)}
button:active{transform:translateY(2px);box-shadow:0 3px 0 #12714e}
button:disabled{background:#99aaa2;box-shadow:0 5px 0 #707870;cursor:not-allowed}
.choice{display:block;width:90%;margin:11px auto;background:#fff;color:#17324d;border:3px solid #8fd4ff;box-shadow:none;font-size:21px}
.dayBtn,.levelBtn{display:block;width:90%;margin:12px auto;background:#fff;color:#17324d;border:3px solid #ffd35c;box-shadow:none;text-align:left}
.dayBtn.selected,.levelBtn.selected{background:#fff1aa;border-color:#ff9f1c}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:8px;font-weight:bold;margin-bottom:12px;font-size:15px}
.progress{letter-spacing:2px;font-size:18px;background:#eefbff;border-radius:14px;padding:9px;margin:8px auto 13px}
.tag{display:inline-block;background:#e8f7ff;border:2px solid #9fd8ff;border-radius:12px;padding:6px 10px;font-weight:bold;margin:4px}
.teacher{background:#fff7d6;border:3px dashed #ffbf3f;border-radius:20px;padding:14px;margin:12px 0;font-size:18px}
.feedback{min-height:38px;font-size:20px;line-height:1.45;font-weight:bold;margin-top:12px}.correct{color:#148f5d}.wrong{color:#d13b3b}
.small{font-size:14px;color:#607080;margin-top:14px}.badge{font-size:27px;background:#fff1a8;display:inline-block;padding:14px 20px;border-radius:18px;margin:14px 0;border:3px solid #ffd95a}
.listenBtn{background:#3366cc;box-shadow:0 5px 0 #20438c;font-size:22px}.helper{background:#fff2fb;border:3px solid #ff9ee8;border-radius:18px;padding:12px;margin:10px 0}
.status{font-size:17px;margin-top:12px;color:#334;min-height:28px}
.grid{display:grid;grid-template-columns:1fr;gap:4px}
.sceneImage{display:block;width:min(100%,620px);max-height:340px;object-fit:contain;margin:12px auto;border-radius:18px;border:3px solid #b8d8ee;background:#f7fcff}
.sentenceBox{font-size:21px;line-height:1.55;background:#fff8d8;border:3px solid #ffd35c;border-radius:16px;padding:16px;margin:14px auto;width:92%;font-weight:bold}
.teacherPhoto{
  display:block;
  width:430px;
  max-width:92%;
  height:auto;
  object-fit:contain;
  object-position:center;
  margin:18px auto;
  border-radius:24px;
  border:4px solid rgba(255,211,92,.95);
  box-shadow:0 14px 34px rgba(0,0,0,.30);
  background:#eef7ff;
  transition:transform .25s ease;
}
.teacherPhoto:hover{
  transform:scale(1.03);
}


/* Final rescue screen */
.game.finalScreen{
  width:min(96vw,980px);
  background:rgba(10,20,28,.32);
  border:1px solid rgba(255,255,255,.16);
  box-shadow:0 18px 55px rgba(0,0,0,.45);
  color:#fff;
  padding:24px 26px 30px;
  backdrop-filter:blur(7px);
}
.finalTitle{
  margin:4px 0 18px;
  font-size:clamp(36px,6vw,64px);
  line-height:1.08;
  color:#fff8de;
  text-shadow:0 4px 14px rgba(0,0,0,.8);
}
.finalTitle .teacherName{
  color:#ffd34e;
}
.finalScreen .teacherPhoto{
  width:min(92%,760px);
  max-width:760px;
  height:auto;
  max-height:none;
  object-fit:contain;
  margin:12px auto 22px;
  border-radius:30px;
  border:4px solid rgba(255,197,45,.96);
  box-shadow:0 18px 45px rgba(0,0,0,.48),0 0 24px rgba(255,185,45,.24);
}
.finalQuote{
  width:min(94%,820px);
  margin:0 auto 18px;
  padding:16px 20px;
  border-radius:22px;
  background:rgba(255,248,220,.96);
  color:#17324d;
  border:3px dashed #ffb52f;
  font-size:20px;
  line-height:1.55;
}
.finalScore{
  display:inline-block;
  min-width:280px;
  margin:4px auto 18px;
  padding:18px 28px;
  border-radius:22px;
  background:linear-gradient(180deg,#fff5b8,#ffe37a);
  color:#17324d;
  border:3px solid #ffc83d;
  box-shadow:0 10px 24px rgba(0,0,0,.28);
  font-size:28px;
  line-height:1.25;
}
.finalInfo{
  width:min(94%,850px);
  margin:0 auto 18px;
  padding:12px 16px;
  border-radius:16px;
  background:rgba(0,0,0,.24);
  color:#fff;
  font-size:17px;
  line-height:1.65;
}
.finalActions{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:12px;
  margin-top:10px;
}
.finalActions button{
  min-width:190px;
  margin:4px;
}
.finalScreen .status,
.finalScreen .small{
  color:#fff;
  text-shadow:0 2px 6px rgba(0,0,0,.8);
}
@media (max-width:640px){
  .game.finalScreen{padding:18px 12px 24px}
  .finalTitle{font-size:38px}
  .finalScreen .teacherPhoto{width:96%;border-radius:22px}
  .finalQuote{font-size:18px}
  .finalScore{font-size:24px;min-width:240px}
  .finalActions{display:grid;grid-template-columns:1fr}
  .finalActions button{width:92%;min-width:0;margin:4px auto}
}


/* Immersive start / intro / found screens */
.game.storyScreen,
.game.startPosterScreen{
  width:min(96vw,980px);
  background:rgba(10,20,28,.34);
  border:1px solid rgba(255,255,255,.16);
  box-shadow:0 18px 55px rgba(0,0,0,.45);
  color:#fff;
  padding:24px 26px 30px;
  backdrop-filter:blur(7px);
}
.storyTitle,
.startPosterTitle{
  margin:4px 0 16px;
  font-size:clamp(34px,5.5vw,58px);
  line-height:1.1;
  color:#fff8de;
  text-shadow:0 4px 14px rgba(0,0,0,.8);
}
.storyTitle .teacherName{
  color:#ffd34e;
}
.storyScreen .teacherPhoto{
  width:min(92%,760px);
  max-width:760px;
  height:auto;
  max-height:none;
  object-fit:contain;
  margin:12px auto 20px;
  border-radius:30px;
  border:4px solid rgba(255,197,45,.96);
  box-shadow:0 18px 45px rgba(0,0,0,.48),0 0 24px rgba(255,185,45,.24);
}
.storyQuote{
  width:min(94%,820px);
  margin:0 auto 18px;
  padding:16px 20px;
  border-radius:22px;
  background:rgba(255,248,220,.96);
  color:#17324d;
  border:3px dashed #ffb52f;
  font-size:20px;
  line-height:1.55;
}
.storyScreen .story,
.startPosterScreen .story{
  color:#fff;
  text-shadow:0 2px 6px rgba(0,0,0,.8);
}
.storyScreen .progress{
  width:min(94%,820px);
}
.mainPoster{
  display:block;
  width:min(92%,760px);
  max-width:760px;
  height:auto;
  margin:10px auto 20px;
  border-radius:28px;
  border:4px solid rgba(255,197,45,.96);
  box-shadow:0 18px 45px rgba(0,0,0,.48),0 0 24px rgba(255,185,45,.20);
}
.startForm{
  width:min(94%,820px);
  margin:0 auto;
  padding:18px 16px;
  border-radius:22px;
  background:rgba(255,255,255,.93);
  color:#17324d;
  box-shadow:0 10px 28px rgba(0,0,0,.24);
}
.startPosterScreen input{
  background:#fff;
}
.startPosterScreen .small{
  color:#fff;
  text-shadow:0 2px 6px rgba(0,0,0,.8);
}
@media (max-width:640px){
  .game.storyScreen,
  .game.startPosterScreen{
    padding:18px 12px 24px;
  }
  .storyTitle,
  .startPosterTitle{
    font-size:36px;
  }
  .storyScreen .teacherPhoto,
  .mainPoster{
    width:96%;
    border-radius:22px;
  }
  .storyQuote{
    font-size:18px;
  }
}

</style>
</head>
<body>
<div class="game" id="app"></div>

<script src="questions.js"></script>
<script src="questions-level2.js"></script>
<script src="questions-level3.js"></script>
<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbytZa1ykFlNE3a4XdJIPJyQzK7PiZlWXlbLU1k7CD23KzUGcpjMuJ6mNaJl-AjH1apl/exec";
let playerName="", playerClass="", selectedLevel="", selectedDay="";
let currentDayData=null, questions=[];
let idx=0, score=0, stars=0, startTime=null, saved=false;
const app=document.getElementById("app");
const DAY_BACKGROUNDS={
  DAY1:{path:"images/backgrounds/day1.jpg",brightness:.82},
  DAY2:{path:"images/backgrounds/day2.jpg",brightness:.72},
  DAY3:{path:"images/backgrounds/day3.jpg",brightness:.68},
  DAY4:{path:"images/backgrounds/day4.jpg",brightness:.70}
};

const TEACHER_IMAGES={
  DAY1:{
    intro:"images/teachers/rachel-intro.jpg",
    found:"images/teachers/rachel-found.jpg",
    rescued:"images/teachers/rachel-rescued.jpg"
  },
  DAY2:{
    intro:"images/teachers/alex-intro.jpg",
    found:"images/teachers/alex-found.jpg",
    rescued:"images/teachers/alex-rescued.jpg"
  },
  DAY3:{
    intro:"images/teachers/sunny-intro.jpg",
    found:"images/teachers/sunny-found.jpg",
    rescued:"images/teachers/sunny-rescued.jpg"
  },
  DAY4:{
    intro:"images/teachers/daniel-intro.jpg",
    found:"images/teachers/daniel-found.jpg",
    rescued:"images/teachers/daniel-rescued.jpg"
  }
};

function setDayTheme(day){
  const bg=DAY_BACKGROUNDS[day];
  if(bg){
    document.body.style.setProperty("--day-bg",`url("${bg.path}")`);
    document.body.style.setProperty("--day-brightness",String(bg.brightness));
  }else{
    document.body.style.setProperty("--day-bg","linear-gradient(#58c7ff 0%,#b9f2ff 45%,#ffe891 100%)");
    document.body.style.setProperty("--day-brightness","1");
  }
}

function teacherPhoto(stage){
  const dayImages=TEACHER_IMAGES[selectedDay];
  const src=dayImages ? dayImages[stage] : "";
  if(!src) return "";
  return `<img class="teacherPhoto" src="${src}" alt="${currentDayData.teacher} 선생님"
    onerror="this.style.display='none';">`;
}


function startScreen(){
  app.classList.remove("finalScreen","storyScreen","startPosterScreen");
  app.classList.add("startPosterScreen");
  saved=false; selectedLevel=""; selectedDay="";
  setDayTheme("");
  app.innerHTML=`
    <h1 class="startPosterTitle">여름방학 영어 섬 탈출 프로젝트</h1>
    <img class="mainPoster" src="images/main-poster.jpg" alt="여름방학 영어 섬 탈출 프로젝트 포스터"
      onerror="this.style.display='none';">
    <div class="story">영어 미션을 해결하고 섬에 흩어진 선생님들을 구해주세요!</div>

    <div class="startForm">
      <input id="name" placeholder="이름 입력 예: 김민준" autocomplete="off"/>
      <input id="className" placeholder="반 입력 예: SC1 / SE2 / ST3" autocomplete="off"/>

      <div class="story" style="color:#17324d;text-shadow:none;margin-bottom:6px;">난이도를 선택하세요.</div>
      <button class="levelBtn" id="lv1" onclick="selectLevel('LEVEL1')">🟢 LEVEL 1 - 파닉스</button>
      <button class="levelBtn" id="lv2" onclick="selectLevel('LEVEL2')">🟡 LEVEL 2 - 의미와 문맥</button>
      <button class="levelBtn" id="lv3" onclick="selectLevel('LEVEL3')">🔴 LEVEL 3 - 기초 문법</button>
      <button onclick="goDaySelect()">다음</button>
    </div>

    <div class="small">LEVEL 1·2·3 / DAY 1~4</div>`;
}
function selectLevel(level){
  selectedLevel=level;
  ["lv1","lv2","lv3"].forEach(id=>document.getElementById(id).classList.remove("selected"));
  if(level==="LEVEL1") document.getElementById("lv1").classList.add("selected");
  if(level==="LEVEL2") document.getElementById("lv2").classList.add("selected");
  if(level==="LEVEL3") document.getElementById("lv3").classList.add("selected");
}

function goDaySelect(){
  playerName=document.getElementById("name").value.trim();
  playerClass=document.getElementById("className").value.trim();
  if(!playerName||!playerClass){alert("이름과 반을 정확히 입력하세요.");return;}
  if(!selectedLevel){alert("난이도를 선택하세요.");return;}
  daySelectScreen();
}

function daySelectScreen(){
  app.classList.remove("finalScreen","storyScreen","startPosterScreen");
  app.classList.remove("finalScreen");
  app.innerHTML=`
    <div class="emoji">🗺️</div>
    <h1>오늘의 미션 선택</h1>
    <div class="story">선생님 한 명씩 구조하세요.</div>
    <button class="dayBtn" id="d1" onclick="selectDay('DAY1')">🌊 DAY 1 - Rachel Rescue / 해변</button>
    <button class="dayBtn" id="d2" onclick="selectDay('DAY2')">🌴 DAY 2 - Alex Rescue / 정글</button>
    <button class="dayBtn" id="d3" onclick="selectDay('DAY3')">⛰️ DAY 3 - Sunny Rescue / 동굴</button>
    <button class="dayBtn" id="d4" onclick="selectDay('DAY4')">🌋 DAY 4 - Daniel Rescue / 화산</button>
    <button onclick="beginGame()">게임 시작</button>
    <button onclick="startScreen()">처음으로</button>`;
}

function selectDay(day){
  selectedDay=day;
  setDayTheme(day);
  ["d1","d2","d3","d4"].forEach(id=>document.getElementById(id).classList.remove("selected"));
  document.getElementById("d"+day.replace("DAY","")).classList.add("selected");
}

function beginGame(){
  if(!selectedDay){alert("DAY를 선택하세요.");return;}
  let dataSource;
  if(selectedLevel==="LEVEL1"){
    dataSource=GAME_DATA;
  }else if(selectedLevel==="LEVEL2"){
    dataSource=LEVEL2_DATA;
  }else if(selectedLevel==="LEVEL3"){
    dataSource=LEVEL3_DATA;
  }else{
    alert("난이도를 다시 선택하세요.");
    return;
  }
  currentDayData=dataSource[selectedDay];
  if(!currentDayData){alert("선택한 레벨의 문제가 아직 준비되지 않았습니다.");return;}
  questions=currentDayData.questions;
  idx=0; score=0; stars=0; saved=false; startTime=new Date();
  storyIntro();
}

function storyIntro(){
  app.classList.remove("finalScreen","storyScreen","startPosterScreen");
  app.classList.add("storyScreen");

  app.innerHTML=`
    <h1 class="storyTitle"><span class="teacherName">${currentDayData.teacher}</span> Rescue</h1>

    ${teacherPhoto("intro")}

    <div class="storyQuote">
      😭 <b>${currentDayData.teacher} 선생님</b><br>
      "도와줘! ${currentDayData.place}에 있어!"<br>
      "영어 미션을 풀어서 나를 구해줘!"
    </div>

    <div class="story">${currentDayData.intro}</div>
    <div class="story">총 <b>12개 미션</b>을 완료하면 구조할 수 있어요.</div>
    <button onclick="showQuestion()">미션 시작</button>`;
}
function progressBar(){
  return "⭐".repeat(stars) + "☆".repeat(questions.length-stars);
}

function showQuestion(){
  app.classList.remove("finalScreen","storyScreen","startPosterScreen");
  app.classList.remove("finalScreen");
  const item=questions[idx];
  let special="";
  if(item.type==="helper") special=`<div class="helper">⭐ Helper Word는 파닉스 규칙만으로 읽기 어려운 특별한 단어예요!</div>`;
  if(item.type==="final") special=`<div class="helper">👑 FINAL RESCUE MISSION<br>이 문제를 풀면 선생님을 구할 수 있어요!</div>`;

  let mediaPart="";
  let tagPart="";

  if(item.type==="picture_sentence"){
    mediaPart=`<img class="sceneImage" src="${item.image}" alt="문제 그림" onerror="this.style.display='none'; this.insertAdjacentHTML('afterend','<div class=&quot;helper&quot;>그림 파일을 찾을 수 없습니다: ${item.image}</div>');">`;
    tagPart=`<div><span class="tag">그림 추론</span></div>`;
  }else if(item.type==="listen_sentence"){
    mediaPart=`<button class="listenBtn" onclick="playAudioFile('${escapeQuote(item.audio)}')">🔊 듣기 재생</button>`;
    tagPart=`<div><span class="tag">듣기 추론</span></div>`;
  }else if(item.type==="blank_word"){
    mediaPart=`<div class="sentenceBox">${item.sentence}</div>`;
    tagPart=`<div><span class="tag">단어 문맥 추론</span></div>`;
  }else if(selectedLevel==="LEVEL3"){
    tagPart=`<div><span class="tag">📝 문법 문제</span></div>`;
    mediaPart="";
  }else{
    const listenPart=(item.type==="listen"||item.type==="helper"||item.type==="final")
      ? `<button class="listenBtn" onclick="speak('${escapeQuote(item.word)}')">🔊 발음 듣기</button>` : "";
    tagPart=`<div><span class="tag">오늘의 소리: ${item.sound}</span></div>`;
    mediaPart=`<div class="emoji">${item.emoji ? item.emoji : "🎧"}</div>${listenPart}${item.type==="sound" ? `<div class="story"><b>${item.word}</b></div>` : ""}`;
  }

  app.innerHTML=`
    <div class="topbar"><div>${selectedDay}</div><div>${selectedLevel}</div><div>문제 ${idx+1}/${questions.length}</div></div>
    <div class="progress">${progressBar()}</div>
    ${tagPart}
    ${special}
    ${mediaPart}
    <h2>${item.prompt}</h2>
    ${item.choices.map(c=>`<button class="choice" onclick="checkAnswer('${escapeQuote(c)}')">${c}</button>`).join("")}
    <div class="feedback" id="feedback"></div>`;
}

function checkAnswer(choice){
  const item=questions[idx];
  const fb=document.getElementById("feedback");
  document.querySelectorAll("button").forEach(b=>b.disabled=true);
  if(choice===item.answer){
    score+=10; stars++;
    fb.innerHTML="🎉 정답입니다! +1 ⭐";
    fb.className="feedback correct";
  }else{
    fb.innerHTML=`😥 아쉬워요!<br>정답은 <b>${item.answer}</b> 입니다.`;
    fb.className="feedback wrong";
  }
  setTimeout(()=>{
    idx++;
    if(idx===4) storyMiddle1();
    else if(idx===8) storyMiddle2();
    else if(idx<questions.length) showQuestion();
    else endScreen();
  },1300);
}

function storyMiddle1(){
  app.classList.remove("finalScreen","storyScreen","startPosterScreen");
  app.classList.add("storyScreen");

  app.innerHTML=`
    <h1 class="storyTitle"><span class="teacherName">${currentDayData.teacher}</span> 선생님을 발견했어요!</h1>

    ${teacherPhoto("found")}

    <div class="storyQuote">
      🥹 "${currentDayData.mid1}"
    </div>

    <div class="progress">${progressBar()}</div>
    <button onclick="showQuestion()">계속하기</button>`;
}
function storyMiddle2(){
  app.classList.remove("finalScreen","storyScreen","startPosterScreen");
  app.classList.remove("finalScreen");
  app.innerHTML=`
    <div class="emoji">🚤✨</div>
    <h1>거의 다 왔어요!</h1>
    <div class="teacher">😊 "${currentDayData.mid2}"</div>
    <div class="progress">${progressBar()}</div>
    <button onclick="showQuestion()">마지막 미션으로</button>`;
}

function endScreen(){
  app.classList.remove("finalScreen","storyScreen","startPosterScreen");
  let badge="Bronze Rescuer";
  if(score>=100) badge="Gold Rescuer";
  else if(score>=80) badge="Silver Rescuer";

  app.classList.add("finalScreen");

  app.innerHTML=`
    <h1 class="finalTitle"><span class="teacherName">${currentDayData.teacher}</span> 구조 성공!</h1>

    ${teacherPhoto("rescued")}

    <div class="finalQuote">
      💖 <b>${currentDayData.teacher} 선생님</b><br>
      "고마워! 덕분에 무사히 탈출했어!"
    </div>

    <div class="finalScore">
      ${stars} / ${questions.length} ⭐<br>
      ${score} EXP<br>
      <b>${badge}</b>
    </div>

    <div class="finalInfo">
      이름: ${playerName} &nbsp; | &nbsp;
      반: ${playerClass} &nbsp; | &nbsp;
      난이도: ${selectedLevel} &nbsp; | &nbsp;
      DAY: ${selectedDay} &nbsp; | &nbsp;
      점수: ${score}
    </div>

    <div class="finalActions">
      <button id="saveBtn" onclick="saveToSheet()">💾 선생님 기록에 저장하기</button>
      <button onclick="daySelectScreen()">📅 다른 DAY 하기</button>
      <button onclick="startScreen()">🏠 처음으로</button>
    </div>

    <div class="status" id="saveStatus">💡 마지막으로 저장 버튼을 눌러야 기록됩니다.</div>
    <div class="small">${currentDayData.next}</div>`;
}
function playAudioFile(path){
  const audio = new Audio(path);
  audio.play().catch(err=>{
    console.error(err);
    alert("오디오 파일을 찾을 수 없습니다.\n\n" + path);
  });
}

function speak(text){
  const dayFolder = selectedDay.toLowerCase();
  const audioPath = `audio/${dayFolder}/${text.toLowerCase()}.mp3`;

  const audio = new Audio(audioPath);

  audio.play().catch(err=>{
    console.error(err);
    alert("오디오 파일을 찾을 수 없습니다.\n\n" + audioPath);
  });
}

function saveToSheet(){
  if(saved){document.getElementById("saveStatus").innerText="이미 저장되었습니다.";return;}
 if(!WEB_APP_URL){
    alert("아직 Apps Script 웹 앱 URL이 들어가지 않았습니다.");
    return;
}
  const saveBtn=document.getElementById("saveBtn");
  const status=document.getElementById("saveStatus");
  saveBtn.disabled=true; status.innerText="저장 중... 잠시만 기다리세요.";
  const playSeconds=startTime?Math.round((new Date()-startTime)/1000):"";
  fetch(WEB_APP_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({
    name:playerName,className:playerClass,level:selectedLevel,score:score,day:selectedDay,teacher:currentDayData.teacher,stars:stars,playSeconds:playSeconds
  })}).then(()=>{saved=true;status.innerText="✅ 저장 완료! 선생님 기록에 제출되었습니다.";})
  .catch(()=>{saveBtn.disabled=false;status.innerText="❌ 저장 실패. 인터넷 연결을 확인하고 다시 눌러주세요.";})
}

function escapeQuote(str){return String(str).replace(/'/g,"\\'");}
startScreen();
</script>
</body>
</html>
